{{ $src := .Get 0 }}
{{ $alt := .Get 1 }}
{{ $caption := .Get 2 }}
{{ $pathArr := split $src "." }}
{{ $pathLen := len $pathArr }}
{{ $ext := index $pathArr (sub $pathLen 1) }}
<figure>
    <picture class="main-image">
        {{ if eq $ext "svg" }}
            <img src="{{ $src }}"  alt="{{ $alt }}"/>
        {{ else }}

            
            {{ $img := resources.Get $src }}
            {{ with $img }}
                {{ $img1x := .Resize "630x"}}
                {{ $img2x := .Resize "945x"}}

                <source srcset="{{ $img1x.RelPermalink }}" media="(max-width: 767px)">
                <source srcset="{{ $img2x.RelPermalink }}" media="(min-width: 768px)">
                <a href="{{ $img2x.RelPermalink }}" target="_blank"><img src="{{ $img2x.RelPermalink }}"  alt="{{ $alt }}"/></a>
            {{ end }}
    </picture>

    {{ end }}
    <figcaption>{{ $caption | markdownify }}</figcaption>
</figure>
